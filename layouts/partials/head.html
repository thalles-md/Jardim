<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>

<meta name="color-scheme" content="light dark">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1220">
<script>
  (function() {
    try {
      var t = localStorage.getItem('theme');
      var dark = t ? (t === 'dark') : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    } catch (_) {}
  })();
</script>

<style>
  /* AJUSTE FINO: LEVEMENTE MAIOR (APROX. +2pt) */
  html, body { 
    font-size: 1.03rem !important; 
    line-height: 1.6 !important;
    background-color: #ffffff; 
    color: #1a1a1a; 
  }

  /* Mantendo o modo escuro */
  html.dark, html.dark body { 
    background-color: #0b1220 !important; 
    color: #e2e8f0 !important; 
  }

  html { color-scheme: light dark; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="dns-prefetch" href="//busuanzi.ibruce.info">
<link rel="preconnect" href="https://busuanzi.ibruce.info" crossorigin>

<link rel="icon" type="image/png" href="/favicon/favicon.png">
<link rel="apple-touch-icon" href="/favicon/favicon.png">

  {{ partial "head/css.html" . }}
  {{ partial "head/js.html" . }}
{{ else }}

  {{ partialCached "head/js.html" . }}
{{ end }}
